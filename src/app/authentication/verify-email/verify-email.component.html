<div class="page-style1 light-mode default-sidebar error-page1">
  <div class="img-card bg-primary">
    <div class="page">
      <div class="container">
        <div class="row">
          <div class="col mx-auto">
            <div class="row justify-content-center">
              <div class="col-md-7 col-lg-5">
                <div class="card card-group mb-0">
                  <div class="card p-4">
                    <div class="card-body text-center">

                      <!-- Loading state -->
                      @if (status === 'loading') {
                        <div class="mb-4">
                          <span class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></span>
                        </div>
                        <h4 class="mb-2">Verifying your email...</h4>
                        <p class="text-muted">Please wait a moment.</p>
                      }

                      <!-- Success state -->
                      @if (status === 'success') {
                        <div class="mb-4">
                          <i class="zmdi zmdi-check-circle text-success" style="font-size: 4rem;"></i>
                        </div>
                        <h4 class="mb-2 text-success">Email Verified!</h4>
                        <p class="text-muted">{{ message }}</p>
                        <p class="text-muted small">Redirecting to login...</p>
                      }

                      <!-- Error state -->
                      @if (status === 'error') {
                        <div class="mb-4">
                          <i class="zmdi zmdi-close-circle text-danger" style="font-size: 4rem;"></i>
                        </div>
                        <h4 class="mb-2 text-danger">Verification Failed</h4>
                        <p class="text-muted">The verification link may be invalid or expired.</p>
                        <a routerLink="/auth/login" class="btn btn-primary mt-2">Go to Login</a>
                      }

                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
