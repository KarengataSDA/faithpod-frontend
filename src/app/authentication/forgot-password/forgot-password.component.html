<div class="page-style1 light-mode default-sidebar error-page1">
  <div class="img-card bg-primary">
    <div class="page">
      <div class="container">
        <div class="row">
          <div class="col mx-auto">
            <div class="row justify-content-center">
              <div class="col-md-7 col-lg-5">
                <div class="login-option">
                  <ul ngbNav #nav="ngbNav">
                    <li ngbNavItem="Angular">
                      <ng-template ngbNavContent>
                        <div class="alert alert-success" *ngIf="message">
                          {{ message }}
                        </div>
                        <div class="alert alert-danger" *ngIf="error">
                          {{ error }}
                        </div>

                        <form (ngSubmit)="sendResetLink()">
                          <div class="text-center title-style mb-6">
                            <h1 class="mb-2">Forgot Password</h1>
                            <hr />
                            <p class="text-muted">
                              Enter your email address and we'll send you a link to reset your password.
                            </p>
                            <p class="text-muted small" *ngIf="isCentralAdmin">
                              <span class="badge bg-info">Central Admin</span>
                            </p>
                          </div>
                          <div class="input-group mb-4">
                            <a
                              href="javascript:void(0)"
                              class="input-group-text bg-white text-muted"
                            >
                              <i class="zmdi zmdi-email text-muted" aria-hidden="true"></i>
                            </a>
                            <input
                              type="email"
                              class="input100 border-start-0 form-control ms-0"
                              placeholder="Email Address"
                              [(ngModel)]="email"
                              name="email"
                              required
                            />
                          </div>
                          <div class="row">
                            <div class="col-12">
                              <button
                                type="submit"
                                class="btn btn-lg btn-primary btn-block"
                                [disabled]="isLoading"
                              >
                                <span *ngIf="isLoading">
                                  <i class="fa fa-spinner fa-spin me-2"></i>Sending...
                                </span>
                                <span *ngIf="!isLoading">Send Reset Link</span>
                              </button>
                            </div>
                          </div>
                          <div class="text-center pt-3">
                            <p class="text-dark mb-0">
                              Remember your password?
                              <a routerLink="/auth/login" class="ms-1">Back to Login</a>
                            </p>
                          </div>
                        </form>
                      </ng-template>
                    </li>
                  </ul>
                </div>
                <div class="card card-group mb-0">
                  <div class="card p-4">
                    <div class="card-body">
                      <div [ngbNavOutlet]="nav" class="ml-4"></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
