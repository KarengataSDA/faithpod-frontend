<div class="page-wrapper">
  <div class="page-header d-print-none">
    <div class="container-xl">
      <div class="row g-2 align-items-center">
        <div class="col">
          <div class="page-pretitle mb-4">Hymnal</div>
          <h2 class="page-title">Hymn Languages</h2>
        </div>
        <div class="col-auto">
          <button class="btn btn-primary" (click)="openCreate()">
            <i class="zmdi zmdi-plus me-1"></i> Add Language
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="page-body">
    <div class="container-xl">

      <!-- Create / Edit Form -->
      <div class="card mb-4" *ngIf="showForm">
        <div class="card-header">
          <h3 class="card-title">{{ editingId ? 'Edit Language' : 'New Language' }}</h3>
        </div>
        <div class="card-body">
          <form [formGroup]="form" (ngSubmit)="submit()">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Name <span class="text-danger">*</span></label>
                <input type="text" class="form-control" formControlName="name" placeholder="e.g. English" />
                <div class="text-danger small mt-1" *ngIf="form.get('name')?.invalid && form.get('name')?.touched">
                  Name is required.
                </div>
              </div>
              <div class="col-md-6">
                <label class="form-label">Description</label>
                <input type="text" class="form-control" formControlName="description" placeholder="Optional description" />
              </div>
              <div class="col-12">
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" formControlName="is_active" id="isActive" />
                  <label class="form-check-label" for="isActive">Active</label>
                </div>
              </div>
            </div>
            <div class="d-flex gap-2 mt-3">
              <button type="submit" class="btn btn-success" [disabled]="form.invalid || isSubmitting">
                <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-1"></span>
                {{ editingId ? 'Update' : 'Create' }}
              </button>
              <button type="button" class="btn btn-secondary" (click)="cancelForm()">Cancel</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Languages Grid -->
      <div class="row">

        <!-- Loading State -->
        <div *ngIf="isLoading" class="col-12">
          <div class="card">
            <div class="card-body text-center py-5">
              <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Language Cards -->
        <ng-container *ngIf="!isLoading">
          <div class="col-lg-4 col-md-6" *ngFor="let lang of languages">
            <div class="card">
              <div class="card-body">
                <div class="d-flex align-items-center">
                  <div class="avatar avatar-lg bg-primary-lt text-primary rounded-circle me-3">
                    <i class="zmdi zmdi-format-queue-music fs-4"></i>
                  </div>
                  <div class="flex-grow-1">
                    <h5 class="mb-1">
                      <a href="javascript:void(0)" (click)="viewHymns(lang)">{{ lang.name }}</a>
                    </h5>
                    <p class="text-muted mb-0 small">{{ lang.description || '—' }}</p>
                  </div>
                </div>
                <div class="mt-3 d-flex justify-content-between align-items-center">
                  <div class="d-flex gap-2 align-items-center">
                    <span class="badge bg-primary">{{ lang.hymns_count ?? 0 }} Hymns</span>
                    <span class="badge" [class.bg-success]="lang.is_active" [class.bg-secondary]="!lang.is_active">
                      {{ lang.is_active ? 'Active' : 'Inactive' }}
                    </span>
                  </div>
                  <div class="d-flex gap-1">
                    <button class="btn btn-sm btn-outline-primary" (click)="viewHymns(lang)" title="View Hymns">
                      <i class="zmdi zmdi-eye"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-warning" (click)="openEdit(lang)" title="Edit">
                      <i class="zmdi zmdi-edit"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-danger" (click)="delete(lang)" title="Delete">
                      <i class="zmdi zmdi-delete"></i>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </ng-container>

        <!-- Empty State -->
        <div *ngIf="!isLoading && languages.length === 0" class="col-12">
          <div class="card">
            <div class="card-body text-center py-5">
              <i class="zmdi zmdi-format-queue-music fs-1 text-muted mb-3" style="font-size: 3rem; display: block;"></i>
              <p class="text-muted">No hymn languages found. Add one to get started.</p>
            </div>
          </div>
        </div>

      </div>

    </div>
  </div>
</div>
