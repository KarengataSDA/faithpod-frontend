<app-page-header [title]="'Hymn Languages'" [items]="['Hymns']" [active_item]="'Languages'"></app-page-header>


<div class="row">
    <!-- Loading State -->
    <div *ngIf="isLoading" class="col-12">
        <div class="card">
            <div class="card-body text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Languages Grid -->
    <ng-container *ngIf="!isLoading">
        <div class="col-lg-4 col-md-6" *ngFor="let language of languages">
            <div class="card">
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="avatar avatar-lg bg-primary-transparent text-primary rounded-circle me-3">
                            <i class="fe fe-music fs-4"></i>
                        </div>
                        <div class="flex-grow-1">
                            <h5 class="mb-1">
                                <a routerLink="/pages/hymns/language/{{language.id}}">{{language.name}}</a>
                            </h5>
                            <p class="text-muted mb-0 small">{{language.description}}</p>
                        </div>
                    </div>
                    <div class="mt-3 d-flex justify-content-between align-items-center">
                        <span class="badge bg-primary">{{language.hymns_count || 0}} Hymns</span>
                        
                        <a routerLink="/pages/hymns/language/{{language.id}}" class="btn btn-sm btn-outline-primary">
                            <i class="fe fe-eye"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </ng-container>

    <!-- Empty State -->
    <div *ngIf="!isLoading && languages.length === 0" class="col-12">
        <div class="card">
            <div class="card-body text-center">
                <i class="fe fe-music fs-1 text-muted mb-3"></i>
                <p class="text-muted">No hymn languages available.</p>
            </div>
        </div>
    </div>
</div>
