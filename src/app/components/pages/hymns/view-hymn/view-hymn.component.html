<app-page-header [title]="hymn ? 'Hymn #' + hymn.hymn_number : 'View Hymn'" [items]="['Hymns']" [active_item]="hymn?.title || 'View'"></app-page-header>

<!-- Loading State -->
<div *ngIf="isLoading" class="card">
    <div class="card-body text-center py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>
</div>

<div *ngIf="!isLoading && hymn" class="row">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <div>
                    <span class="badge bg-primary me-2">{{hymn.hymn_number}}</span>
                    <span class="badge bg-secondary">{{hymn.language?.name}}</span>
                </div>
                <div>
                    <button *ngIf="currentUser$ | async" class="btn btn-sm me-1" [class.btn-danger]="hymn.is_favorite" [class.btn-outline-danger]="!hymn.is_favorite" (click)="toggleFavorite()">
                        <i class="fe fe-heart"></i> {{hymn.is_favorite ? 'Favorited' : 'Add to Favorites'}}
                    </button>
                </div>
            </div>
            <div class="card-body">
                <h2 class="mb-2">{{hymn.title}}</h2>
                <p *ngIf="hymn.author" class="text-muted mb-4">
                    <i class="fe fe-user me-1"></i> {{hymn.author}}
                </p>
                <div class="hymn-lyrics">
                    <pre class="lyrics-text">{{hymn.lyrics}}</pre>
                </div>
            </div>
        </div>
    </div>

    <div class="col-lg-4">
        <div class="card">
            <div class="card-header">
                <div class="card-title">Quick Navigation</div>
            </div>
            <div class="card-body">
                <a routerLink="/pages/hymns" class="btn btn-outline-primary w-100 mb-2">
                    <i class="fe fe-list me-2"></i> All Hymns
                </a>
                <a *ngIf="hymn.language" routerLink="/pages/hymns/language/{{hymn.language.id}}" class="btn btn-outline-secondary w-100 mb-2">
                    <i class="fe fe-globe me-2"></i> {{hymn.language.name}} Hymns
                </a>
                <a *ngIf="currentUser$ | async" routerLink="/pages/hymns/favorites" class="btn btn-outline-danger w-100">
                    <i class="fe fe-heart me-2"></i> My Favorites
                </a>
            </div>
        </div>
    </div>
</div>
