<app-page-header [title]="'Edit Hymn Language'" [items]="['Hymns', 'Languages']" [active_item]="'Edit'"></app-page-header>

<div class="row">
    <div class="col-xl-8">
        <div class="card">
            <div class="card-header">
                <div class="card-title">Edit Language</div>
            </div>

            <!-- Loading State -->
            <div *ngIf="isLoading" class="card-body text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>

            <form *ngIf="!isLoading" [formGroup]="form" (ngSubmit)="onSubmit()">
                <div class="card-body">
                    <div class="mb-4">
                        <label class="form-label">Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" formControlName="name" placeholder="e.g., English, Kiswahili">
                        <div *ngIf="form.get('name')?.touched && form.get('name')?.invalid" class="text-danger mt-1">
                            <small *ngIf="form.get('name')?.errors?.['required']">Name is required</small>
                            <small *ngIf="form.get('name')?.errors?.['minlength']">Name must be at least 2 characters</small>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" formControlName="description" rows="3" placeholder="Brief description of this hymn collection"></textarea>
                    </div>

                    <div class="mb-4">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" formControlName="is_active" id="isActive">
                            <label class="form-check-label" for="isActive">Active</label>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <button type="submit" class="btn btn-primary" [disabled]="isSubmitting">
                        <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-1" role="status"></span>
                        {{ isSubmitting ? 'Saving...' : 'Save Changes' }}
                    </button>
                    <button type="button" class="btn btn-default float-end" (click)="onDiscard()">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</div>
