<div class="img-card bg-primary">
  <div class="page">
    <div class="page-content error-page error2 text-white">
      <div class="container text-center">
        <div class="error-template">
          <img src="assets/images/brand/faithpod-logo-white.png" alt="FaithPod" class="mb-4" style="max-width: 280px; opacity: 0.1;">
          <h1 class="display-1 mb-2" style="opacity: 0.5;">404</h1>
          <h4 class="mb-2">Church Not Found</h4>
          <p class="error-details mb-4">
            This church isn't on FaithPod yet.
          </p>
          <div class="text-center">
            <a [href]="contactUrl" class="btn btn-warning mt-3 mb-5 text-primary bold">
              <i class="fa fa-envelope me-2"></i> Contact FaithPod
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
